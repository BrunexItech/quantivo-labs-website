version: '3.8'

services:
  db:
    image: postgres:15
    container_name: quantivo_db
    environment:
      POSTGRES_DB: quantivo_db
      POSTGRES_USER: quantivo_user
      POSTGRES_PASSWORD: quantivo_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantivo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: quantivo_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py createsuperuser --noinput --email quantivo.itech@gmail.com || true &&
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - DB_NAME=quantivo_db
      - DB_USER=quantivo_user
      - DB_PASSWORD=quantivo_pass
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DJANGO_SUPERUSER_EMAIL=quantivo.itech@gmail.com
      - DJANGO_SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD}
      # Email settings
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: quantivo_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: